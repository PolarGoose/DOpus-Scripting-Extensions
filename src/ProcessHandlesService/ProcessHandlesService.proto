syntax = "proto3";

package ProcessHandlesService;

import "google/protobuf/empty.proto";

message PidList {
  repeated int64 pids = 1;
}

message LockedFilesAndProcessInfos {
  map<string /* filePath */, PidList /* listOfLockingProcessPids */> locked_files = 1;
  map<int64 /* PID */, string /* processName */> processes = 2;
}

service ProcessHandlesServiceGrpc {
  rpc GetAllLockedFiles(google.protobuf.Empty) returns (LockedFilesAndProcessInfos);
}
